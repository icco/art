# https://taskfile.dev
version: "3"
tasks:
  default:
    desc: Run the server
    cmds:
      - task: server
  run:
    desc: Run the server (alias for server)
    cmds:
      - task: server
  server:
    desc: Run the server
    cmds:
      - go run .
  tui:
    desc: Run the TUI
    cmds:
      - go run ./cmd/art
  build:
    desc: Build both binaries into ./bin
    cmds:
      - mkdir -p bin
      - go build -o bin/art-server .
      - go build -o bin/art ./cmd/art
  test:
    desc: Run the test suite
    cmds:
      # -p 1 serializes package test binaries; they share one Postgres schema.
      - go test -p 1 ./...
  lint:
    desc: Vet and check formatting
    cmds:
      - go vet ./...
      - test -z "$(gofmt -l .)" || (echo "run gofmt"; exit 1)
  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy
  docker-up:
    desc: Start docker compose services
    cmds:
      - docker compose up -d
  docker-down:
    desc: Stop docker compose services
    cmds:
      - docker compose down
