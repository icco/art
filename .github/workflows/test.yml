name: Test Go
on:
  - push
jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: art
          POSTGRES_PASSWORD: art
          POSTGRES_DB: art_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U art -d art_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://art:art@localhost:5432/art_test?sslmode=disable
      COVERAGE_THRESHOLD: "50"
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Download dependencies
        run: go mod download
      - name: Build
        run: go build -v ./...
      - name: Test with coverage
        # -p 1 serializes per-package test binaries; multiple packages call
        # testdb.Open which drop+migrates the same Postgres schema.
        run: go test -v -p 1 -coverprofile=coverage.out ./...
      - name: Enforce coverage threshold
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')
          echo "Total coverage: ${total}% (threshold: ${COVERAGE_THRESHOLD}%)"
          awk -v c="$total" -v t="$COVERAGE_THRESHOLD" \
            'BEGIN { if (c+0 < t+0) { exit 1 } }' || {
              echo "::error::coverage ${total}% is below threshold ${COVERAGE_THRESHOLD}%"
              exit 1
            }
